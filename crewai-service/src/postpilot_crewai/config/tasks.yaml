compose_response:
  description: >
    Respond to the creator's message.

    Match their voice: rhythm, vocabulary, and hook style — learned from their
    real posts in the context below.

    Stay anchored in their niche: use your knowledge of what top creators in that
    niche are doing today, not generic advice.

    Respond in {language} unless the user clearly switches to another language.

    User message:
    {message}

    Context:
    {account_context}

    Prior conversation:
    {history_summary}
  expected_output: >
    The response, in the creator's voice.
